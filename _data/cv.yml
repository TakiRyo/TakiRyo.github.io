    Projects:
      - name: Visual Haptics Manipulation - Robotic Drawer Opening
        summary: Implement a visual-haptics manipulation pipeline enabling a robotic arm to perform contact-rich tasks through force-feedback and visual perception.
        highlights:
          - Robotic Manipulation
          - Haptics
