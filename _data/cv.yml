          - Human-Robot Interaction
        start_date: 2026-01
        end_date: ""

      - name: Object-Triggered 3D Semantic SLAM
        summary: Developed an efficient 3D Semantic SLAM system that selectively reconstructs environments based on object detection to optimize computational resources for mobile robots.
        highlights:
          - SLAM
          - Computer Vision
          - Perception
        start_date: 2025-09
        end_date: 2026-01

      - name: Semantic 3D Mapping
        summary: Built a semantic mapping framework combining 2D segmentation and 3D SLAM using RGB-D data. Enhanced environment understanding for autonomous robots through semantic 3D reconstruction. Paper accepted by AMC 2026.
        highlights:
          - SLAM
          - Semantic Segmentation
          - Computer Vision
        start_date: 2025-04
        end_date: 2025-09

      - name: "Autonomous Driving: Obstacle Avoidance"
        summary: Implemented a LiDAR-based obstacle detection pipeline on a real autonomous vehicle, including filtering and clustering. Integrated detection results with the ROS2 navigation stack for autonomous path planning.
        highlights:
          - Path Planning
          - Navigation
          - Autonomous Vehicle
        start_date: 2025-06
        end_date: 2025-07

